<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" width="820" height="300" font-family="'SF Mono','Cascadia Code','JetBrains Mono','Fira Code',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0a0e14"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2230"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <clipPath id="l1" clipPathUnits="userSpaceOnUse"><rect x="30" y="70" height="30" width="252"><animate attributeName="width" from="0" to="252" begin="0.2s" dur="0.9s" fill="freeze"/></rect></clipPath>
    <clipPath id="l2" clipPathUnits="userSpaceOnUse"><rect x="30" y="104" height="30" width="378"><animate attributeName="width" from="0" to="378" begin="1.2s" dur="0.7s" fill="freeze"/></rect></clipPath>
    <clipPath id="l3" clipPathUnits="userSpaceOnUse"><rect x="30" y="148" height="30" width="322"><animate attributeName="width" from="0" to="322" begin="2.1s" dur="0.9s" fill="freeze"/></rect></clipPath>
    <clipPath id="l4" clipPathUnits="userSpaceOnUse"><rect x="30" y="182" height="30" width="400"><animate attributeName="width" from="0" to="400" begin="3.1s" dur="0.8s" fill="freeze"/></rect></clipPath>
    <clipPath id="l5" clipPathUnits="userSpaceOnUse"><rect x="30" y="226" height="30" width="190"><animate attributeName="width" from="0" to="190" begin="4.0s" dur="0.5s" fill="freeze"/></rect></clipPath>
  </defs>

  <!-- window -->
  <rect x="10" y="8" width="800" height="284" rx="12" fill="url(#bg)" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <!-- title bar -->
  <path d="M10,20 a12,12 0 0 1 12,-12 h776 a12,12 0 0 1 12,12 v26 h-800 z" fill="url(#bar)"/>
  <line x1="10" y1="46" x2="810" y2="46" stroke="#30363d" stroke-width="1"/>
  <circle cx="34" cy="27" r="6.5" fill="#ff5f56"/>
  <circle cx="56" cy="27" r="6.5" fill="#ffbd2e"/>
  <circle cx="78" cy="27" r="6.5" fill="#27c93f"/>
  <text x="410" y="32" text-anchor="middle" font-size="14" fill="#768390">byQuexo — zsh</text>

  <!-- terminal body -->
  <g font-size="18">
    <!-- L1: command -->
    <text y="90" clip-path="url(#l1)">
      <tspan x="30" fill="#3fb950">byQuexo</tspan><tspan fill="#58a6ff">@ilert</tspan><tspan fill="#768390">:~$ </tspan><tspan fill="#f0f6fc">whoami</tspan>
    </text>
    <!-- L2: output -->
    <text y="124" clip-path="url(#l2)">
      <tspan x="30" fill="#3fb950">↳ </tspan><tspan fill="#c9d1d9">Junior Software Engineer </tspan><tspan fill="#58a6ff">@ ilert</tspan>
    </text>
    <!-- L3: command -->
    <text y="168" clip-path="url(#l3)">
      <tspan x="30" fill="#3fb950">byQuexo</tspan><tspan fill="#58a6ff">@ilert</tspan><tspan fill="#768390">:~$ </tspan><tspan fill="#f0f6fc">cat </tspan><tspan fill="#a5d6ff">focus.md</tspan>
    </text>
    <!-- L4: output -->
    <text y="202" clip-path="url(#l4)">
      <tspan x="30" fill="#3fb950">↳ </tspan><tspan fill="#c9d1d9">Teaching </tspan><tspan fill="#d2a8ff">LLMs</tspan><tspan fill="#c9d1d9"> to handle </tspan><tspan fill="#ff7b72">incidents</tspan><tspan fill="#c9d1d9">.</tspan>
    </text>
    <!-- L5: prompt -->
    <text y="246" clip-path="url(#l5)">
      <tspan x="30" fill="#3fb950">byQuexo</tspan><tspan fill="#58a6ff">@ilert</tspan><tspan fill="#768390">:~$ </tspan>
    </text>
  </g>

  <!-- blinking cursor -->
  <rect x="212" y="230" width="11" height="20" fill="#3fb950" opacity="1">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.06s" begin="4.5s" repeatCount="indefinite"/>
  </rect>
</svg>
